# Configuración de la aplicación
spring.application.name=asignacion-turnos-enfermeria

# Configuración de la base de datos PostgreSQL
spring.datasource.url=***REMOVED***
spring.datasource.username=***REMOVED***
spring.datasource.password=***REMOVED***
spring.datasource.driver-class-name=org.***REMOVED***ql.Driver

# Configuración de JPA/Hibernate
spring.jpa.database-platform=***REMOVED***
spring.jpa.hibernate.ddl-auto=***REMOVED***
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Configuración de HikariCP (Pool de conexiones)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-Turnos
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

# Configuración de Spring Security
spring.security.user.name=***REMOVED***
spring.security.user.password=***REMOVED***

# Configuración de SpringDoc/Swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuración del servidor
server.port=***REMOVED***

# Configuración de logging (opcional)
logging.level.com.turnos=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE